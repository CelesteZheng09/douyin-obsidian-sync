# ===== 抖音收藏夹 → Obsidian 流水线配置 =====
# 复制本文件为 config.yaml 后填写真实值。config.yaml 不要提交到 git。

douyin:
  # 要监听的收藏夹名称。首次验证时会自动解析稳定 ID。
  favorite_folder_name: "AI学习"
  # 可留空；python -m pipeline.setup 或首次采集后可自动识别。
  favorite_folder_id: ""
  # 抖音个人主页 URL（登录后访问，用于进入"收藏"标签）
  profile_url: "https://www.douyin.com/user/self?showSubTab=favorite_folder&showTab=favorite_collection"
  # 登录态 Cookie 存储文件（首次扫码登录后保存，之后复用；失效再刷新）
  cookies_file: "./secrets/douyin_cookies.json"
  # 自动从 storage_state 转换，供 yt-dlp 复用同一登录态
  yt_dlp_cookies_file: "./secrets/douyin_cookies.txt"
  # 瀑布流滚动加载的最大滚动次数（防止收藏夹很长时抓不全）
  max_scroll: 40

obsidian:
  # Obsidian vault 根目录（本机绝对路径，Codex 上填你的真实路径）
  vault_path: "/Users/you/Obsidian/MyVault"
  # 笔记落地的相对子目录
  notes_subdir: "_LLM/sources/web_clips/AI学习"
  tags: ["douyin", "AI学习"]

asr:
  model_size: "small"      # faster-whisper 模型：tiny/base/small/medium
  model_dir: "./.models/faster-whisper-small"
  download_workers: 1
  download_timeout: 300
  device: "cpu"
  compute_type: "int8"
  cpu_threads: 4
  language: "zh"
  # 单段转写时长上限（秒）。超过则自动按此长度切片再合并，规避超时
  chunk_seconds: 2400

summarize:
  # 核心观点生成方式：
  #   "manual"  = 只产出逐字稿，核心观点留占位（你/Codex 端用 LLM 补）
  #   "openai"  = 调用 OpenAI 兼容接口生成核心观点
  mode: "manual"
  openai_base_url: "https://api.openai.com/v1"
  openai_model: "gpt-4o-mini"
  # 密钥从环境变量读取：OPENAI_API_KEY

runtime:
  workdir: "./.work"                 # 下载/转写的临时工作目录
  state_file: "./state/processed.json"  # 已处理 video_id 清单
  lock_file: "./state/pipeline.lock"    # 防止定时与手动任务重叠
  env_file: "./secrets/runtime.env"     # 可选，本机密钥文件；不会提交 Git
  schedule: "0 10 * * *"            # 每天 10:00（cron 表达式，供 Codex 端定时器使用）
  # 普通 Node/npm 安装即可；也可填写自定义绝对路径。
  node_executable: "node"
  playwright_module: "playwright"
